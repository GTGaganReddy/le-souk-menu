<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>Le Souk · Marokkanische Küche · Klagenfurt</title>
<meta name="description" content="Le Souk – Café & Bistro für authentische marokkanische Küche in Klagenfurt. Tajines, Couscous & orientalische Spezialitäten.">
<link rel="icon" type="image/jpeg" href="images/logo.jpg">

<!-- Open Graph (nice link preview when shared) -->
<meta property="og:title" content="Le Souk · Marokkanische Küche">
<meta property="og:description" content="Ihr Garant für authentische marokkanische Küche – Klagenfurt.">
<meta property="og:image" content="images/hero-tajine.jpg">
<meta property="og:type" content="restaurant">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600&family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&family=Great+Vibes&display=swap" rel="stylesheet">

<style>
  :root{
    --black:#0b0b0c;
    --panel:#111114;
    --gold:#c9a24b;
    --gold-bright:#e3c275;
    --cream:#e9e3d6;
    --muted:#a89c84;
    --line:rgba(201,162,75,.28);
    --maxw:760px;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html{scroll-behavior:smooth}
  body{
    background:var(--black);
    color:var(--cream);
    font-family:'Cormorant Garamond',Georgia,serif;
    font-size:19px;
    line-height:1.5;
    -webkit-font-smoothing:antialiased;
    background-image:radial-gradient(circle at 50% -10%, rgba(201,162,75,.10), transparent 55%);
  }
  img{display:block;max-width:100%}
  .wrap{max-width:var(--maxw);margin:0 auto;padding:0 22px}

  /* ---- Sticky top bar (language + category jump) ---- */
  .topbar{
    position:sticky;top:0;z-index:20;
    background:rgba(11,11,12,.92);backdrop-filter:blur(9px);
    border-bottom:1px solid var(--line);
  }
  .lang{
    display:flex;justify-content:center;gap:6px;
    padding:9px 10px 7px;
  }
  .lang button{
    font-family:'Cinzel',serif;font-size:12px;letter-spacing:1px;
    background:transparent;color:var(--muted);border:1px solid transparent;
    border-radius:999px;padding:5px 12px;cursor:pointer;transition:.2s;
  }
  .lang button:hover{color:var(--gold-bright)}
  .lang button.active{color:var(--black);background:var(--gold);border-color:var(--gold)}

  /* category jump chips */
  .cats{
    display:flex;gap:7px;overflow-x:auto;scrollbar-width:none;
    padding:3px 14px 9px;border-top:1px solid rgba(201,162,75,.14);
  }
  .cats::-webkit-scrollbar{display:none}
  .cats a{
    flex:0 0 auto;text-decoration:none;
    font-family:'Cinzel',serif;font-size:11px;letter-spacing:1px;text-transform:uppercase;
    color:var(--muted);border:1px solid var(--line);border-radius:999px;
    padding:5px 13px;transition:.2s;white-space:nowrap;
  }
  .cats a:hover{color:var(--gold-bright)}
  .cats a.active{color:var(--black);background:var(--gold-bright);border-color:var(--gold-bright)}

  /* anchored sections clear the sticky bar (single offset, ~bar height) */
  html{scroll-padding-top:0}
  .section,.subsec,.group-title{scroll-margin-top:102px}
  .hero a{display:block;cursor:pointer}

  /* ---- Header ---- */
  header{text-align:center;padding:40px 0 14px}
  header .logo{width:150px;margin:0 auto 6px;filter:drop-shadow(0 4px 14px rgba(0,0,0,.6))}
  .brand{font-family:'Great Vibes',cursive;color:var(--gold-bright);
    font-size:74px;line-height:1;margin:4px 0 2px}
  .sub{font-family:'Cinzel',serif;letter-spacing:5px;text-transform:uppercase;
    font-size:12.5px;color:var(--muted)}
  .tagline{font-style:italic;color:var(--cream);max-width:480px;margin:22px auto 4px;
    font-size:20px;opacity:.92}

  /* ---- Hero photos ---- */
  .hero{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin:26px 0 8px}
  .hero figure{position:relative;border:1px solid var(--line);border-radius:4px;overflow:hidden}
  .hero img{width:100%;height:230px;object-fit:cover;transition:transform .6s ease}
  .hero figure:hover img{transform:scale(1.05)}
  .hero figcaption{
    position:absolute;left:0;right:0;bottom:0;
    background:linear-gradient(transparent,rgba(0,0,0,.85));
    color:var(--gold-bright);font-family:'Cinzel',serif;letter-spacing:1.5px;
    font-size:11px;text-transform:uppercase;text-align:center;padding:22px 6px 8px}

  /* ---- Section ---- */
  .group-title{
    text-align:center;font-family:'Cinzel',serif;color:var(--gold);
    letter-spacing:8px;text-transform:uppercase;font-size:15px;
    margin:54px 0 6px;
  }
  .group-title::after{content:"";display:block;width:54px;height:1px;background:var(--gold);
    margin:12px auto 0;opacity:.6}

  .section{margin-top:30px}
  .section h3{
    font-family:'Cinzel',serif;color:var(--gold-bright);font-weight:500;
    letter-spacing:3px;text-transform:uppercase;font-size:14px;
    display:flex;align-items:center;gap:14px;margin-bottom:4px;
  }
  .section h3::after{content:"";flex:1;height:1px;background:var(--line)}
  .section .note{font-style:italic;color:var(--muted);font-size:14px;margin-bottom:12px}
  .sec-haupt > h3{margin-bottom:2px}
  .subhead{font-family:'Cinzel',serif;color:var(--gold);font-weight:500;letter-spacing:2.5px;
    text-transform:uppercase;font-size:12.5px;display:flex;align-items:center;gap:12px;margin:24px 0 4px}
  .subhead::after{content:"";flex:1;height:1px;background:rgba(201,162,75,.16)}
  .secsub{font-style:italic;color:var(--muted);font-size:15px;margin:3px 0 12px;letter-spacing:.3px}
  .sec-haupt > .secsub{margin-bottom:16px}

  /* dietary badges */
  .badge{font-family:'Cinzel',serif;font-size:9px;letter-spacing:1px;text-transform:uppercase;
    padding:2px 7px;border-radius:999px;border:1px solid var(--line);color:var(--gold-bright);
    white-space:nowrap;align-self:center;flex:0 0 auto}
  .badge.b-chef{background:var(--gold);color:var(--black);border-color:var(--gold)}
  .badge.b-vegan,.badge.b-veg{color:#a7d6a7;border-color:rgba(167,214,167,.4)}
  .badge.b-spicy{color:#e3936f;border-color:rgba(227,147,111,.45)}
  .row .badge{margin-left:8px;transform:translateY(-1px)}

  /* filter chips */
  .filters{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin:24px 0 0}
  .filters .fchip{font-family:'Cinzel',serif;font-size:11px;letter-spacing:1px;text-transform:uppercase;
    background:transparent;color:var(--muted);border:1px solid var(--line);border-radius:999px;
    padding:7px 15px;cursor:pointer;transition:.2s}
  .filters .fchip:hover{color:var(--gold-bright)}
  .filters .fchip.active{background:var(--gold);color:var(--black);border-color:var(--gold)}

  /* sheet badges + allergens */
  .shbadges{display:flex;flex-wrap:wrap;gap:7px;margin-top:12px}
  .shallerg{font-size:14px;color:var(--muted);font-style:italic;margin-top:16px;border-top:1px solid var(--line);padding-top:12px}

  .item{display:flex;flex-direction:column;gap:3px;padding:11px 6px;width:100%;text-align:left;
    background:none;border:none;border-bottom:1px dotted rgba(201,162,75,.18);
    color:inherit;font:inherit;border-radius:6px}
  .item:last-child{border-bottom:none}
  .item.tap{cursor:pointer;transition:background .2s}
  .item.tap:hover,.item.tap:active{background:rgba(201,162,75,.08)}
  .item .row{display:flex;align-items:baseline;gap:8px;width:100%}
  .item .name{font-weight:600;font-size:20px;color:var(--cream)}
  .item .lead{flex:1;border-bottom:1px dotted rgba(201,162,75,.35);transform:translateY(-5px);min-width:16px}
  .item .price{font-family:'Cinzel',serif;font-size:15px;color:var(--gold-bright);white-space:nowrap;letter-spacing:.5px}
  .item .price small{color:var(--muted);font-size:12px}
  .item .desc{font-style:italic;font-weight:400;font-size:16px;color:var(--muted);line-height:1.42;max-width:64ch}

  /* ---- Dish / drink detail sheet (half screen) ---- */
  .overlay{position:fixed;inset:0;z-index:40;background:rgba(0,0,0,.6);
    opacity:0;pointer-events:none;transition:opacity .3s}
  .overlay.open{opacity:1;pointer-events:auto}
  .sheet{position:fixed;left:0;right:0;bottom:0;z-index:41;
    max-width:var(--maxw);margin:0 auto;
    background:var(--panel);border:1px solid var(--line);border-bottom:none;
    border-radius:20px 20px 0 0;box-shadow:0 -16px 50px rgba(0,0,0,.6);
    transform:translateY(102%);transition:transform .34s cubic-bezier(.2,.8,.2,1);
    max-height:82vh;overflow-y:auto}
  .sheet.open{transform:translateY(0)}
  .sheet .grip{width:42px;height:4px;border-radius:99px;background:var(--line);margin:10px auto 0}
  .sheet .shimg{height:200px;background-size:cover;background-position:center;margin:14px 16px 0;border-radius:12px;border:1px solid var(--line)}
  .sheet .shimg.ph{display:flex;align-items:center;justify-content:center;background:#0d0d10}
  .sheet .shimg.ph img{width:120px;opacity:.85}
  .sheet .shbody{padding:18px 22px 30px}
  .sheet .shhead{display:flex;justify-content:space-between;align-items:baseline;gap:12px}
  .sheet h4{font-family:'Cinzel',serif;color:var(--gold-bright);font-weight:500;font-size:21px;letter-spacing:1px}
  .sheet .shprice{font-family:'Cinzel',serif;color:var(--gold-bright);font-size:18px;white-space:nowrap}
  .sheet .shsub{font-size:19px;font-style:italic;color:var(--gold-bright);margin-top:10px;line-height:1.5}
  .sheet .shstory{font-size:18px;color:var(--cream);opacity:.92;margin-top:14px;line-height:1.6}
  .sheet .shstory .lbl{font-family:'Cinzel',serif;font-size:11px;letter-spacing:2px;text-transform:uppercase;color:var(--gold);display:block;margin:16px 0 4px}
  .sheet .shclose{position:absolute;top:14px;right:18px;background:none;border:none;color:var(--muted);font-size:26px;cursor:pointer;line-height:1}
  .shaction{margin-top:22px;display:flex;align-items:center;gap:16px}
  .shaction .shadd{display:inline-flex;align-items:center;gap:8px;
    font-family:'Cinzel',serif;font-size:13px;letter-spacing:1.5px;text-transform:uppercase;
    background:var(--gold);color:var(--black);border:1px solid var(--gold);border-radius:999px;
    padding:12px 24px;cursor:pointer;transition:.2s}
  .shaction .shadd:hover{background:var(--gold-bright);border-color:var(--gold-bright)}
  .shaction.stepper .wq{width:36px;height:36px;font-size:22px}
  .shaction .shqty{font-family:'Cinzel',serif;font-size:22px;color:var(--gold-bright);min-width:22px;text-align:center}
  body.locked{overflow:hidden}

  /* tap hint */
  .taphint{display:none;align-items:center;gap:9px;justify-content:center;width:max-content;
    margin:18px auto 0;padding:9px 18px;border:1px solid var(--line);border-radius:999px;
    color:var(--gold-bright);font-style:italic;font-size:15.5px;background:rgba(201,162,75,.07)}
  .taphint.show{display:flex;animation:fabin .5s ease}
  .taphint svg{flex:0 0 auto}

  /* ---- Add (+) button on each row ---- */
  .item .add{flex:0 0 auto;width:26px;height:26px;border-radius:50%;cursor:pointer;
    border:1px solid var(--line);background:transparent;color:var(--gold-bright);
    font-size:18px;line-height:1;display:inline-flex;align-items:center;justify-content:center;
    transition:.18s;transform:translateY(-2px)}
  .item .add:hover{border-color:var(--gold)}
  .item .add.on{background:var(--gold);color:var(--black);border-color:var(--gold)}

  /* ---- Floating "my selection" button ---- */
  .fab{position:fixed;right:16px;bottom:18px;z-index:30;
    display:none;align-items:center;gap:9px;
    background:var(--gold);color:var(--black);border:none;border-radius:999px;
    padding:12px 18px;cursor:pointer;box-shadow:0 8px 24px rgba(0,0,0,.5);
    font-family:'Cinzel',serif;font-size:12px;letter-spacing:1.5px;text-transform:uppercase}
  .fab.show{display:inline-flex;animation:fabin .3s ease}
  @keyframes fabin{from{transform:translateY(20px);opacity:0}to{transform:translateY(0);opacity:1}}
  .fab svg{width:18px;height:18px;fill:none;stroke:currentColor;stroke-width:2}
  .fab .fab-count{background:var(--black);color:var(--gold-bright);border-radius:999px;
    min-width:21px;height:21px;padding:0 6px;display:inline-flex;align-items:center;justify-content:center;
    font-family:'Cormorant Garamond',serif;font-weight:600;font-size:15px}

  /* ---- Wishlist panel ---- */
  .wsheet .wbody{padding:6px 22px 32px}
  .wsheet .moe{display:flex;align-items:center;gap:14px;margin:8px 0 6px}
  .wsheet .moe img{width:66px;height:66px;border-radius:50%;object-fit:cover;border:2px solid var(--gold);flex:0 0 auto}
  .wsheet .moe .moemsg{font-style:italic;font-size:17px;color:var(--cream);line-height:1.4}
  .wsheet h4{font-family:'Cinzel',serif;color:var(--gold-bright);font-weight:500;font-size:18px;
    letter-spacing:2px;text-transform:uppercase;margin:18px 0 6px}
  .wrow{display:flex;align-items:center;gap:12px;padding:11px 0;border-bottom:1px dotted rgba(201,162,75,.18)}
  .wrow .wn{flex:1;font-size:19px;color:var(--cream);min-width:0}
  .wrow .wp{font-family:'Cinzel',serif;font-size:14px;color:var(--gold-bright);white-space:nowrap;min-width:54px;text-align:right}
  .wqty{display:flex;align-items:center;gap:9px;flex:0 0 auto}
  .wqty b{min-width:16px;text-align:center;font-size:18px;font-weight:600;color:var(--cream)}
  .wq{width:28px;height:28px;border-radius:50%;border:1px solid var(--line);background:transparent;
    color:var(--gold-bright);font-size:18px;line-height:1;cursor:pointer;display:inline-flex;
    align-items:center;justify-content:center;flex:0 0 auto}
  .wq:hover{border-color:var(--gold);background:rgba(201,162,75,.1)}
  .wempty{font-style:italic;color:var(--muted);padding:20px 0;text-align:center}
  .wclear{margin-top:20px;background:none;border:1px solid var(--line);color:var(--muted);
    border-radius:999px;padding:9px 18px;font-family:'Cinzel',serif;font-size:11px;letter-spacing:1.5px;
    text-transform:uppercase;cursor:pointer}
  .wclear:hover{color:var(--gold-bright);border-color:var(--gold)}

  /* ---- Storefront strip ---- */
  .sign{margin:46px 0 0;border-top:1px solid var(--line);border-bottom:1px solid var(--line)}
  .sign img{width:100%;height:210px;object-fit:cover;opacity:.95}

  /* ---- Footer ---- */
  footer{text-align:center;padding:44px 0 96px}
  footer .fbrand{font-family:'Great Vibes',cursive;color:var(--gold-bright);font-size:46px}
  footer .info{font-size:18px;margin-top:8px;line-height:1.7}
  footer a{color:var(--gold-bright);text-decoration:none;border-bottom:1px solid var(--line)}
  .hours{margin:20px auto 0;display:inline-block;text-align:left;
    border:1px solid var(--line);border-radius:6px;padding:14px 26px}
  .hours .ht{font-family:'Cinzel',serif;letter-spacing:3px;font-size:12px;color:var(--gold);
    text-transform:uppercase;text-align:center;margin-bottom:8px}
  .hours .row{display:flex;justify-content:space-between;gap:30px;font-size:17px}
  .copyright{margin-top:30px;font-size:13px;color:var(--muted);font-style:italic}

  @media (max-width:560px){
    .brand{font-size:58px}
    header{padding:30px 0 8px}
    .hero img{height:165px}
    .item .name{font-size:18.5px}
    body{font-size:18px}
  }
</style>
</head>
<body>

<div class="topbar">
  <nav class="lang" id="lang" aria-label="Sprache wählen">
    <button data-lang="de">DE</button>
    <button data-lang="en">EN</button>
    <button data-lang="it">IT</button>
    <button data-lang="sl">SL</button>
  </nav>
  <nav class="cats" id="cats" aria-label="Kategorien"></nav>
</div>

<header class="wrap">
  <img class="logo" src="images/logo.jpg" alt="Le Souk Logo">
  <div class="brand">Le Souk</div>
  <div class="sub" id="sub">Marokkanische Küche · Café · Bistro</div>
  <p class="tagline" id="tagline"></p>
</header>

<div class="wrap">
  <div class="hero">
    <figure><a href="#sec-tajines"><img src="images/hero-tajine.jpg" alt="Tajine"><figcaption id="cap1">Tajine</figcaption></a></figure>
    <figure><a href="#sec-couscous"><img src="images/hero-couscous.jpg" alt="Couscous"><figcaption id="cap2">Couscous</figcaption></a></figure>
  </div>
  <div class="taphint" id="tapHint">
    <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 11V6a2 2 0 114 0v5m0-3a2 2 0 114 0v3m0 0a2 2 0 114 0v3a7 7 0 01-7 7h-2a7 7 0 01-5-2l-3-3a2 2 0 113-3l2 2"/></svg>
    <span id="tapHintText"></span>
  </div>
</div>

<div class="wrap"><div class="filters" id="filters"></div></div>
<main class="wrap" id="menu"></main>

<div class="sign"><img src="images/banner.jpg" alt="Marokkanische Spezialitäten im Le Souk"></div>

<footer class="wrap">
  <div class="fbrand">Le Souk</div>
  <div class="info">
    Universitätsstraße 25 · 9020 Klagenfurt<br>
    <a href="tel:+436769378098">+43 676 937 8098</a> ·
    <a href="https://instagram.com/Lesouk_klagenfurt" target="_blank" rel="noopener">@Lesouk_klagenfurt</a>
  </div>
  <div class="hours">
    <div class="ht" id="hoursTitle">Öffnungszeiten</div>
    <div class="row"><span id="d1">Di – Sa</span><span>17:00 – 00:00</span></div>
    <div class="row"><span id="d2">So &amp; Mo</span><span id="closed">Ruhetag</span></div>
  </div>
  <div class="copyright" id="copy"></div>
</footer>

<div class="overlay" id="overlay"></div>
<aside class="sheet" id="sheet" role="dialog" aria-modal="true" aria-label="Detail">
  <button class="shclose" id="shClose" aria-label="Schließen">&times;</button>
  <div class="grip"></div>
  <div class="shimg" id="shImg"></div>
  <div class="shbody">
    <div class="shhead"><h4 id="shName"></h4><span class="shprice" id="shPrice"></span></div>
    <div class="shbadges" id="shBadges"></div>
    <p class="shsub" id="shSub"></p>
    <div class="shstory" id="shStory"></div>
    <p class="shallerg" id="shAllerg"></p>
    <div class="shaction" id="shAction"></div>
  </div>
</aside>

<!-- Floating "my selection" button -->
<button class="fab" id="fab" type="button" aria-label="Meine Auswahl">
  <svg viewBox="0 0 24 24"><path d="M5 3v8m0 0a2 2 0 002-2V3m-2 8v10M11 3c0 3 1 6 3 6v12"/></svg>
  <span class="fab-text"></span>
  <span class="fab-count" id="fabCount">0</span>
</button>

<!-- Wishlist panel -->
<div class="overlay" id="wOverlay"></div>
<aside class="sheet wsheet" id="wsheet" role="dialog" aria-modal="true" aria-label="Meine Auswahl">
  <button class="shclose" id="wClose" aria-label="Schließen">&times;</button>
  <div class="grip"></div>
  <div class="wbody">
    <div class="moe"><img src="images/moe.jpg" alt="Moe"><div class="moemsg" id="moeMsg"></div></div>
    <h4 id="wTitle"></h4>
    <div id="wList"></div>
    <button class="wclear" id="wClear" type="button"></button>
  </div>
</aside>

<script>
/* ============ MENU DATA ============
   Prices read from the Le Souk POS terminal.
   To edit: change the price/name here. A string name is shown in every
   language; an object {de,en,it,sl} is translated per language.       */

const T = {
  sub:{de:"Marokkanische Küche · Café · Bistro",en:"Moroccan Cuisine · Café · Bistro",it:"Cucina Marocchina · Café · Bistro",sl:"Maroška kuhinja · Café · Bistro"},
  tagline:{
    de:"Ihr Garant für authentische marokkanische Küche. Höchste Qualität der Zutaten ist für uns selbstverständlich.",
    en:"Your guarantee for authentic Moroccan cuisine. The finest quality of ingredients is a matter of course for us.",
    it:"La vostra garanzia di autentica cucina marocchina. La massima qualità degli ingredienti è per noi un dovere.",
    sl:"Vaše zagotovilo za pristno maroško kuhinjo. Najvišja kakovost sestavin je za nas samoumevna."},
  cap1:{de:"Tajine",en:"Tagine",it:"Tajine",sl:"Tažin"},
  cap2:{de:"Couscous",en:"Couscous",it:"Couscous",sl:"Kuskus"},
  foodGroup:{de:"Speisen",en:"Food",it:"Cucina",sl:"Jedi"},
  drinkGroup:{de:"Getränke",en:"Drinks",it:"Bevande",sl:"Pijače"},
  hoursTitle:{de:"Öffnungszeiten",en:"Opening Hours",it:"Orari di apertura",sl:"Odpiralni čas"},
  d1:{de:"Di – Sa",en:"Tue – Sat",it:"Mar – Sab",sl:"Tor – Sob"},
  d2:{de:"So & Mo",en:"Sun & Mon",it:"Dom & Lun",sl:"Ned & Pon"},
  closed:{de:"Ruhetag",en:"Closed",it:"Chiuso",sl:"Zaprto"},

// Drinks are shown in natural drinking order regardless of data order.
const DRINK_ORDER=["aperitif","cocktails","wein","bier","alkoholfrei","kaffee-tee","spirituosen"];
const orderedDrinks=()=>DRINK_ORDER.map(id=>DRINKS.find(s=>s.id===id)).filter(Boolean);

let lang = "de";
const pick = v => (typeof v === "string") ? v : (v[lang] || v.de);

const REG = {};
let wish = JSON.parse(localStorage.getItem("lesouk_wish")||"{}");
if(Array.isArray(wish)){const m={};wish.forEach(u=>m[u]=1);wish=m;}   // migrate old format
const qty = uid => wish[uid]||0;
const inWish = uid => qty(uid)>0;
const wishTotal = () => Object.values(wish).reduce((a,b)=>a+b,0);
function saveWish(){localStorage.setItem("lesouk_wish",JSON.stringify(wish));}
function setQty(uid,q){ if(q<=0) delete wish[uid]; else wish[uid]=q; saveWish(); updateWishUI(); }
function addQty(uid,d){ setQty(uid, qty(uid)+d); }
function toggleWish(uid){ setQty(uid, inWish(uid)?0:1); }

function itemTags(it, prefix){
  let tags=(it.tags||[]).slice();
  if((prefix==="kaffee-tee"||prefix==="alkoholfrei") && !tags.includes("alkfrei")) tags.push("alkfrei");
  if(tags.includes("vegan") && !tags.includes("veg")) tags.push("veg");
  return tags;
}
function badgesHtml(tags){
  const show=tags.filter(t=>t!=="alkfrei" && !(t==="veg"&&tags.includes("vegan")));
  return show.map(t=>`<span class="badge b-${t}">${pick(T.tags[t])}</span>`).join("");
}
function renderItems(items, prefix, showDesc){
  return items.map((it,idx)=>{
    const uid = prefix+"-"+idx; REG[uid]=it;
    const tap = !!(it.desc || it.img || it.story);
    const bt = it.b ? ` <small>${pick(T.bottle)}</small>` : "";
    const desc = (showDesc && it.desc) ? `<span class="desc">${pick(it.desc)}</span>` : "";
    const add = tap ? `<button class="add${inWish(uid)?" on":""}" type="button" data-add="${uid}" aria-label="merken">${inWish(uid)?"✓":"+"}</button>` : "";
    const attr = tap ? ` data-uid="${uid}" role="button" tabindex="0"` : "";
    const tags = itemTags(it, prefix);
    const tagAttr = tags.length ? ` data-tags="${tags.join(' ')}"` : "";
    const badges = badgesHtml(tags);
    return `<div class="item${tap?" tap":""}"${attr}${tagAttr}>
        <span class="row"><span class="name">${pick(it.name)}</span>${badges}<span class="lead"></span><span class="price">€ ${it.p}${bt}</span>${add}</span>
        ${desc}
      </div>`;
  }).join("");
}
function renderSections(list, showDesc){
  return list.map(sec=>{
    const st = sec.sub ? `<p class="secsub">${pick(sec.sub)}</p>` : "";
    if(sec.subs){
      const subs = sec.subs.map(sub=>
        `<div class="subsec" id="sec-${sub.id}"><h4 class="subhead">${pick(sub.title)}</h4>${renderItems(sub.items, sub.id, showDesc)}</div>`).join("");
      return `<div class="section sec-haupt" id="sec-${sec.id}"><h3>${pick(sec.title)}</h3>${st}${subs}</div>`;
    }
    const note = sec.gb ? `<div class="note">${pick(T.glassBottle)}</div>` : "";
    return `<div class="section" id="sec-${sec.id}"><h3>${pick(sec.title)}</h3>${st}${note}${renderItems(sec.items, sec.id, showDesc)}</div>`;
  }).join("");
}

function renderCats(){
  const all=[...FOOD,...orderedDrinks()];
  document.getElementById("cats").innerHTML = all.map(sec=>
    `<a href="#sec-${sec.id}" data-target="sec-${sec.id}">${pick(sec.title)}</a>`).join("");
}

let filter="all";
function renderFilters(){
  const fl=[["all",T.filterAll],["chef",T.tags.chef],["veg",T.tags.veg],["vegan",T.tags.vegan],["alkfrei",T.tags.alkfrei]];
  document.getElementById("filters").innerHTML=fl.map(([f,lab])=>
    `<button class="fchip${f===filter?' active':''}" type="button" data-filter="${f}">${pick(lab)}</button>`).join("");
}
function applyFilter(){
  document.querySelectorAll('#menu .item').forEach(it=>{
    const tags=(it.dataset.tags||'').split(' ');
    it.style.display=(filter==='all'||tags.includes(filter))?'':'none';
  });
  document.querySelectorAll('#menu .subsec').forEach(ss=>{
    ss.style.display=[...ss.querySelectorAll('.item')].some(i=>i.style.display!=='none')?'':'none';
  });
  document.querySelectorAll('#menu .section').forEach(sec=>{
    sec.style.display=[...sec.querySelectorAll('.item')].some(i=>i.style.display!=='none')?'':'none';
  });
  document.querySelectorAll('#menu .group-title').forEach(gt=>{
    let el=gt.nextElementSibling, vis=false;
    while(el && !el.classList.contains('group-title')){
      if(el.classList.contains('section') && el.style.display!=='none'){vis=true;break;}
      el=el.nextElementSibling;
    }
    gt.style.display=vis?'':'none';
  });
}
document.getElementById("filters").addEventListener("click",e=>{
  const b=e.target.closest("[data-filter]"); if(!b) return;
  filter=b.dataset.filter; renderFilters(); applyFilter();
});

let spy;
function setupScrollSpy(){
  if(spy) spy.disconnect();
  const cats=document.getElementById("cats");
  const links=[...cats.querySelectorAll("a")];
  const byId=Object.fromEntries(links.map(a=>[a.dataset.target,a]));
  spy=new IntersectionObserver(entries=>{
    entries.forEach(e=>{
      if(e.isIntersecting){
        const a=byId[e.target.id]; if(!a) return;
        links.forEach(l=>l.classList.remove("active"));
        a.classList.add("active");
        // center the active chip WITHIN its own bar only (never scrolls the page)
        const r=a.getBoundingClientRect(), cr=cats.getBoundingClientRect();
        cats.scrollBy({left:(r.left+r.width/2)-(cr.left+cr.width/2),behavior:"smooth"});
      }
    });
  },{rootMargin:"-130px 0px -68% 0px",threshold:0});
  document.querySelectorAll(".section").forEach(s=>spy.observe(s));
}

function scrollToSec(id){
  const el=document.getElementById(id);
  if(el) el.scrollIntoView({behavior:"smooth",block:"start"});
}

/* ----- detail sheet ----- */
const overlay=document.getElementById("overlay");
const sheet=document.getElementById("sheet");
function openSheet(uid){
  const it=REG[uid]; if(!it) return;
  document.getElementById("shName").textContent=pick(it.name);
  document.getElementById("shPrice").textContent="€ "+it.p;
  const sub=document.getElementById("shSub");
  sub.textContent=it.desc?pick(it.desc):"";
  sub.style.display=it.desc?"":"none";
  const story=document.getElementById("shStory");
  story.textContent=it.story?pick(it.story):"";
  story.style.display=it.story?"":"none";
  const prefix=uid.slice(0,uid.lastIndexOf("-"));
  document.getElementById("shBadges").innerHTML=badgesHtml(itemTags(it,prefix));
  document.getElementById("shAllerg").textContent=it.allerg?(pick(T.allergLabel)+": "+it.allerg):pick(T.allergNote);
  const img=document.getElementById("shImg");
  if(it.img){img.className="shimg";img.style.backgroundImage="url('"+it.img+"')";img.innerHTML="";}
  else{img.className="shimg ph";img.style.backgroundImage="none";img.innerHTML='<img src="images/logo.jpg" alt="">';}
  sheet.dataset.uid=uid; renderShAction(uid);
  sheet.scrollTop=0;
  overlay.classList.add("open");sheet.classList.add("open");document.body.classList.add("locked");
  markHintSeen();
}
function renderShAction(uid){
  const el=document.getElementById("shAction");
  if(inWish(uid)){
    el.className="shaction stepper";
    el.innerHTML=`<button class="wq" type="button" data-shdec="1" aria-label="weniger">−</button><b class="shqty">${qty(uid)}</b><button class="wq" type="button" data-shinc="1" aria-label="mehr">+</button>`;
  }else{
    el.className="shaction";
    el.innerHTML=`<button class="shadd" type="button" id="shAddBtn">${pick(T.addBtn)}</button>`;
  }
}
function markHintSeen(){ localStorage.setItem("lesouk_hint","1"); const h=document.getElementById("tapHint"); if(h) h.classList.remove("show"); }
function closeSheet(){overlay.classList.remove("open");sheet.classList.remove("open");document.body.classList.remove("locked");}
overlay.addEventListener("click",closeSheet);
document.getElementById("shClose").addEventListener("click",closeSheet);
document.getElementById("shAction").addEventListener("click",e=>{
  const uid=sheet.dataset.uid; if(!uid) return;
  if(e.target.closest("#shAddBtn")){ setQty(uid,1); return; }
  if(e.target.closest("[data-shinc]")){ addQty(uid,1); return; }
  if(e.target.closest("[data-shdec]")){ addQty(uid,-1); return; }
});
document.addEventListener("keydown",e=>{if(e.key==="Escape"){closeSheet();closeWish();}});

/* ----- my-selection (wishlist) ----- */
const wOverlay=document.getElementById("wOverlay");
const wsheet=document.getElementById("wsheet");
function updateWishUI(){
  const n=wishTotal(), fab=document.getElementById("fab");
  document.getElementById("fabCount").textContent=n;
  document.querySelector("#fab .fab-text").textContent=pick(T.fabLabel);
  fab.classList.toggle("show", n>0);
  document.querySelectorAll(".item .add").forEach(b=>{const on=inWish(b.dataset.add);b.classList.toggle("on",on);b.textContent=on?"✓":"+";});
  if(sheet.classList.contains("open") && sheet.dataset.uid) renderShAction(sheet.dataset.uid);
  if(wsheet.classList.contains("open")) renderWishList();
}
function renderWishList(){
  document.getElementById("wTitle").textContent=pick(T.wishTitle);
  document.getElementById("moeMsg").textContent=pick(T.moeMsg);
  const clear=document.getElementById("wClear"); clear.textContent=pick(T.wishClear);
  const list=document.getElementById("wList");
  const ids=Object.keys(wish);
  if(!ids.length){list.innerHTML=`<div class="wempty">${pick(T.wishEmpty)}</div>`;clear.style.display="none";return;}
  clear.style.display="";
  list.innerHTML=ids.map(uid=>{const it=REG[uid];if(!it)return "";
    return `<div class="wrow">
      <span class="wn">${pick(it.name)}</span>
      <span class="wqty"><button class="wq" type="button" data-dec="${uid}" aria-label="weniger">−</button><b>${qty(uid)}</b><button class="wq" type="button" data-inc="${uid}" aria-label="mehr">+</button></span>
      <span class="wp">€ ${it.p}</span>
    </div>`;}).join("");
}
function openWish(){renderWishList();wsheet.scrollTop=0;wOverlay.classList.add("open");wsheet.classList.add("open");document.body.classList.add("locked");}
function closeWish(){wOverlay.classList.remove("open");wsheet.classList.remove("open");document.body.classList.remove("locked");}
document.getElementById("fab").addEventListener("click",openWish);
wOverlay.addEventListener("click",closeWish);
document.getElementById("wClose").addEventListener("click",closeWish);
document.getElementById("wList").addEventListener("click",e=>{
  const inc=e.target.closest("[data-inc]"); if(inc){addQty(inc.dataset.inc,1);return;}
  const dec=e.target.closest("[data-dec]"); if(dec){addQty(dec.dataset.dec,-1);return;}
});
document.getElementById("wClear").addEventListener("click",()=>{wish=[];saveWish();updateWishUI();});

/* ----- one-time click wiring (containers persist across re-renders) ----- */
document.getElementById("menu").addEventListener("click",e=>{
  const add=e.target.closest(".add"); if(add){const u=add.dataset.add; if(!inWish(u)) setQty(u,1); openSheet(u); return;}
  const row=e.target.closest(".item.tap"); if(row) openSheet(row.dataset.uid);
});
document.getElementById("menu").addEventListener("keydown",e=>{
  if(e.key==="Enter"||e.key===" "){const row=e.target.closest(".item.tap");if(row){e.preventDefault();openSheet(row.dataset.uid);}}
});
document.getElementById("cats").addEventListener("click",e=>{
  const a=e.target.closest("a"); if(!a) return;
  e.preventDefault(); scrollToSec(a.dataset.target);
});
document.querySelectorAll(".hero a").forEach(a=>a.addEventListener("click",e=>{
  e.preventDefault(); scrollToSec(a.getAttribute("href").slice(1));
}));

function render(){
  document.documentElement.lang = lang;
  document.getElementById("sub").textContent = pick(T.sub);
  document.getElementById("tagline").textContent = pick(T.tagline);
  document.getElementById("cap1").textContent = pick(T.cap1);
  document.getElementById("cap2").textContent = pick(T.cap2);
  document.getElementById("hoursTitle").textContent = pick(T.hoursTitle);
  document.getElementById("d1").textContent = pick(T.d1);
  document.getElementById("d2").textContent = pick(T.d2);
  document.getElementById("closed").textContent = pick(T.closed);
  document.getElementById("copy").textContent = pick(T.copy);

  document.getElementById("menu").innerHTML =
    `<div class="group-title">${pick(T.foodGroup)}</div>${renderSections(FOOD,true)}` +
    `<div class="group-title">${pick(T.drinkGroup)}</div>${renderSections(orderedDrinks(),false)}`;

  document.getElementById("tapHintText").textContent = pick(T.tapHint);
  document.getElementById("tapHint").classList.toggle("show", !localStorage.getItem("lesouk_hint"));

  renderCats();
  renderFilters();
  setupScrollSpy();
  updateWishUI();
  applyFilter();

  document.querySelectorAll("#lang button").forEach(b=>
    b.classList.toggle("active", b.dataset.lang===lang));
}

document.getElementById("lang").addEventListener("click",e=>{
  const b=e.target.closest("button"); if(!b) return;
  lang=b.dataset.lang; localStorage.setItem("lesouk_lang",lang); render();
});

// Austria → German first by default. A returning visitor's manual choice is kept.
lang = localStorage.getItem("lesouk_lang") || "de";
if(!["de","en","it","sl"].includes(lang)) lang="de";
render();
</script>
